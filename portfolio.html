<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Script House</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0f172a] text-slate-200">
    <nav class="p-6 max-w-6xl mx-auto flex justify-between">
        <a href="index.html" class="font-bold text-white">← Back Home</a>
    </nav>

    <section class="max-w-6xl mx-auto px-6 py-12">
        <h2 class="text-4xl font-extrabold text-white mb-12">Our Work Samples</h2>
        
        <div class="space-y-12">
            <div>
                <h3 class="text-amber-400 font-bold uppercase tracking-widest mb-6 text-sm">01. One-Minute Stories (Reels/Shorts)</h3>
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">

                    </div>
                </div>
            </div>

            <div>
                <h3 class="text-amber-400 font-bold uppercase tracking-widest mb-6 text-sm">02. 10-Minute Narrative Scripts</h3>
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                        <p class="italic text-slate-400">"A mystery thriller for a YouTube series..."</p>
                        <button class="mt-4 text-white font-semibold">Read Script ↗</button>
                    </div>
                </div>
            </div>
        </div>
